<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>velui — CommonOS compositor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    canvas#app { display: block; touch-action: none; }
    #error {
      display: none; position: fixed; inset: 0;
      background: #1a0a0a; color: #ff8080;
      font: 14px/1.6 monospace; padding: 2rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="error"></div>
  <script type="module" src="./dist/index.js"></script>
  <script>
    window.addEventListener('unhandledrejection', e => {
      const el = document.getElementById('error');
      el.style.display = 'block';
      el.textContent = 'velui error:\n\n' + (e.reason?.stack ?? String(e.reason));
    });
  </script>
</body>
</html>
